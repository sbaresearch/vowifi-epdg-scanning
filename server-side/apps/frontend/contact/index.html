<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — VoWiFi Watchdog</title>
  <link rel="stylesheet" href="/static/css/landing.css" />
  <link rel="stylesheet" href="/static/css/theme-toggle.css" />
  <link rel="stylesheet" href="/static/css/contact.css" />
  <script src="/static/js/theme.js"></script>
</head>
<body class="landing-page">
  <main class="landing-shell">
    <header class="landing-nav">
      <button id="theme-toggle" aria-label="Switch to dark mode">
        <span class="theme-icon">&#x263D;</span>
      </button>
    </header>

    <section class="info-panel">
      <div class="section-heading">
        <p class="section-label"></p>
        <h2>Contact</h2>
      </div>
      <div class="contact-info-row">
        <span class="contact-info-label">Address</span>
        <span></span>
      </div>
      <div class="contact-info-row">
        <span class="contact-info-label">Phone</span>
        <a href=""></a>
      </div>
      <div class="contact-info-row">
        <span class="contact-info-label">Fax</span>
        <span></span>
      </div>
      <div class="contact-info-row">
        <span class="contact-info-label">E-Mail</span>
        <a href=""></a>
      </div>
    </section>

    <section class="info-panel">
      <div class="section-heading">
        <p class="section-label">Identifizierung gemäß § 14 UGB</p>
        <h2>Legal Notice</h2>
      </div>
      <dl class="contact-legal">
        <dt>Company name</dt>
        <dd></dd>
        <dt>Address</dt>
        <dd></dd>
        <dt>Commercial register no.</dt>
        <dd></dd>
        <dt>UID</dt>
        <dd></dd>
        <dt>Commercial register court</dt>
        <dd></dd>
      </dl>
    </section>
  </main>

  <footer class="landing-footer">
    <p>
      Map boundaries are based on <a href="https://www.naturalearthdata.com/">Natural Earth</a> data.
      This project also relies on <a href="https://github.com/zmap/zdns">zdns</a> and MCC/MNC <a href="https://mcc-mnc.com/">enrichment sources</a>.
    </p>
  </footer>
</body>
</html>
